<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Heart Quiz - Sunday School Games</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <div class="container">
    <div class="game-header">
      <a href="../../index.html" class="back-btn">←</a>
      <h2>❤️ Heart Quiz</h2>
    </div>

    <div class="score-bar">
      <span class="score">점수: <strong id="score">0</strong></span>
      <span class="progress" id="progress">1 / 10</span>
    </div>

    <div id="quiz-area">
      <div class="quiz-card">
        <p class="verse" id="verse"></p>
        <p class="question" id="question"></p>
        <div class="choices" id="choices"></div>
        <div class="explanation" id="explanation"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">다음 문제 →</button>
      </div>
    </div>

    <div id="result-area" style="display:none;">
      <div class="result-screen">
        <div class="emoji" id="result-emoji"></div>
        <h2 id="result-title"></h2>
        <div class="result-score" id="result-score"></div>
        <p class="result-msg" id="result-msg"></p>
        <div class="btn-group">
          <button class="retry-btn" onclick="startGame()">다시 도전! 🔄</button>
          <a href="../../index.html" class="home-btn">홈으로 돌아가기 🏠</a>
        </div>
      </div>

      <div class="quiz-card" style="margin-top:16px; text-align:left;">
        <h3 style="margin-bottom:12px;">📖 오늘의 말씀</h3>
        <p style="font-size:0.9rem; line-height:1.7; color:#555;">
          "너는 마음을 다하여 여호와를 신뢰하고 네 명철을 의지하지 말라"
          <br><strong>— 잠언 3:5</strong>
        </p>
      </div>
    </div>
  </div>

  <script>
    const allQuestions = [
      {
        verse: "마가복음 7:21-23",
        question: "예수님은 사람을 더럽게 하는 것이 어디서 나온다고 하셨나요?",
        choices: ["음식에서", "마음 속에서", "다른 사람에게서", "환경에서"],
        answer: 1,
        explanation: "예수님은 악한 생각, 도둑질, 살인, 거짓말 등이 모두 사람의 마음 속에서 나온다고 가르치셨어요. 그래서 마음을 깨끗하게 지키는 것이 중요해요!"
      },
      {
        verse: "누가복음 6:45",
        question: "선한 사람은 마음의 쌓은 선에서 무엇을 내나요?",
        choices: ["돈을 내요", "선한 것을 내요", "나쁜 것을 내요", "아무것도 안 내요"],
        answer: 1,
        explanation: "마음에 좋은 것을 쌓으면 좋은 말과 행동이 나오고, 나쁜 것을 쌓으면 나쁜 것이 나와요. 마음의 보물창고를 선한 것으로 채우세요!"
      },
      {
        verse: "잠언 4:23",
        question: "잠언에서 무엇보다 지켜야 할 것이 무엇이라고 했나요?",
        choices: ["재산", "건강", "네 마음", "친구"],
        answer: 2,
        explanation: "\"모든 지킬 만한 것 중에 더욱 네 마음을 지키라 생명의 근원이 이에서 남이니라.\" 마음은 생명의 근원이에요!"
      },
      {
        verse: "사무엘상 16:7",
        question: "하나님은 사람의 무엇을 보신다고 했나요?",
        choices: ["외모", "중심(마음)", "재능", "키"],
        answer: 1,
        explanation: "\"사람은 외모를 보거니와 여호와는 중심을 보느니라.\" 하나님은 겉모습이 아니라 우리의 마음을 보세요!"
      },
      {
        verse: "예레미야 29:13",
        question: "하나님을 찾으려면 어떻게 해야 한다고 했나요?",
        choices: ["공부를 잘하면", "마음을 다하여 찾으면", "교회만 다니면", "착한 척 하면"],
        answer: 1,
        explanation: "\"너희가 온 마음으로 나를 구하면 나를 만나리라.\" 형식이 아닌 진심으로 하나님을 찾을 때 만날 수 있어요!"
      },
      {
        verse: "로마서 10:9-10",
        question: "구원을 받으려면 마음으로 무엇을 해야 하나요?",
        choices: ["걱정해야 해요", "믿어야 해요", "의심해야 해요", "무시해야 해요"],
        answer: 1,
        explanation: "\"마음으로 하나님께서 그를 죽은 자 가운데서 살리신 것을 믿으면 구원을 받으리라.\" 마음의 믿음이 구원의 열쇠예요!"
      },
      {
        verse: "마태복음 22:37",
        question: "예수님이 말씀하신 가장 크고 첫째 되는 계명은?",
        choices: ["공부 열심히 하라", "마음을 다하여 하나님을 사랑하라", "부자가 되라", "유명해져라"],
        answer: 1,
        explanation: "\"네 마음을 다하고 목숨을 다하고 뜻을 다하여 주 너의 하나님을 사랑하라.\" 이것이 가장 큰 계명이에요!"
      },
      {
        verse: "사무엘상 10:9",
        question: "하나님이 사울에게 무엇을 주셨나요?",
        choices: ["많은 돈", "새 마음", "큰 군대", "좋은 음식"],
        answer: 1,
        explanation: "하나님은 사울에게 새 마음을 주셔서 예언도 하게 하셨어요. 하나님께 마음을 드리면 새롭게 변화시켜 주세요!"
      },
      {
        verse: "잠언 3:5",
        question: "마음을 다하여 무엇을 해야 한다고 했나요?",
        choices: ["자기 자신을 믿어야", "여호와를 신뢰해야", "돈을 벌어야", "걱정해야"],
        answer: 1,
        explanation: "\"너는 마음을 다하여 여호와를 신뢰하고 네 명철을 의지하지 말라.\" 내 생각보다 하나님을 먼저 믿는 것이 지혜예요!"
      },
      {
        verse: "에스겔 11:19",
        question: "하나님이 돌 같은 마음 대신 무엇을 주신다고 했나요?",
        choices: ["금 마음", "육의 마음 (부드러운 마음)", "강한 마음", "차가운 마음"],
        answer: 1,
        explanation: "\"그 몸에서 돌 같은 마음을 제거하고 육의 마음을 줄 것이라.\" 하나님은 딱딱한 마음을 부드럽고 따뜻하게 바꿔주세요!"
      },
      {
        verse: "갈라디아서 5:22-23",
        question: "성령의 열매에 포함되지 않는 것은?",
        choices: ["사랑, 기쁨", "화냄, 질투", "온유, 절제", "평화, 인내"],
        answer: 1,
        explanation: "성령의 열매는 사랑, 희락, 화평, 오래 참음, 자비, 양선, 충성, 온유, 절제예요. 마음에 성령이 열매를 맺게 해주세요!"
      },
      {
        verse: "시편 51:10",
        question: "다윗이 하나님께 무엇을 구했나요?",
        choices: ["돈과 권력", "깨끗한 마음", "긴 수명", "원수 복수"],
        answer: 1,
        explanation: "\"하나님이여 내 속에 정한 마음을 창조하시고 내 안에 정직한 영을 새롭게 하소서.\" 깨끗한 마음은 하나님께 구해야 해요!"
      },
      {
        verse: "마태복음 5:8",
        question: "마음이 청결한 자는 무엇을 한다고 했나요?",
        choices: ["부자가 된다", "하나님을 볼 것이다", "유명해진다", "시험에 합격한다"],
        answer: 1,
        explanation: "\"마음이 청결한 자는 복이 있나니 그들이 하나님을 볼 것임이요.\" 깨끗한 마음으로 하나님을 만나요!"
      },
      {
        verse: "역대상 28:9",
        question: "하나님은 모든 사람의 무엇을 살피신다고 했나요?",
        choices: ["성적표", "마음", "은행 잔고", "SNS"],
        answer: 1,
        explanation: "\"여호와는 모든 마음을 감찰하사 모든 사상을 아시나니.\" 하나님은 우리 마음 속 생각까지 다 아세요!"
      },
      {
        verse: "사무엘상 15:22-23",
        question: "사울 왕이 마음을 다해 하나님을 따르지 않아 어떻게 되었나요?",
        choices: ["더 큰 왕이 되었다", "왕위를 잃었다", "더 부자가 되었다", "아무 일도 없었다"],
        answer: 1,
        explanation: "사울은 하나님의 명령에 불순종하여 결국 왕위를 잃었어요. 마음을 다해 하나님을 따르는 것이 얼마나 중요한지 보여줘요!"
      }
    ];

    let questions = [];
    let current = 0;
    let score = 0;
    let answered = false;

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function startGame() {
      questions = shuffle(allQuestions).slice(0, 10);
      current = 0;
      score = 0;
      answered = false;
      document.getElementById('quiz-area').style.display = 'block';
      document.getElementById('result-area').style.display = 'none';
      renderQuestion();
    }

    function renderQuestion() {
      const q = questions[current];
      document.getElementById('verse').textContent = '📖 ' + q.verse;
      document.getElementById('question').textContent = q.question;
      document.getElementById('score').textContent = score;
      document.getElementById('progress').textContent = (current + 1) + ' / ' + questions.length;

      const choicesEl = document.getElementById('choices');
      choicesEl.innerHTML = '';
      q.choices.forEach((c, i) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = c;
        btn.onclick = () => selectAnswer(i);
        choicesEl.appendChild(btn);
      });

      document.getElementById('explanation').className = 'explanation';
      document.getElementById('next-btn').className = 'next-btn';
      answered = false;
    }

    function selectAnswer(idx) {
      if (answered) return;
      answered = true;

      const q = questions[current];
      const btns = document.querySelectorAll('.choice-btn');

      btns.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.answer) btn.classList.add('correct');
        if (i === idx && idx !== q.answer) btn.classList.add('wrong');
      });

      if (idx === q.answer) score += 10;
      document.getElementById('score').textContent = score;

      const expEl = document.getElementById('explanation');
      expEl.textContent = '💡 ' + q.explanation;
      expEl.className = 'explanation show';

      const nextBtn = document.getElementById('next-btn');
      nextBtn.textContent = current < questions.length - 1 ? '다음 문제 →' : '결과 보기 🎉';
      nextBtn.className = 'next-btn show';
    }

    function nextQuestion() {
      current++;
      if (current >= questions.length) {
        showResult();
      } else {
        renderQuestion();
      }
    }

    function showResult() {
      document.getElementById('quiz-area').style.display = 'none';
      document.getElementById('result-area').style.display = 'block';

      const pct = score / (questions.length * 10) * 100;
      let emoji, title, msg;

      if (pct >= 90) {
        emoji = '🌟'; title = '놀라워요!';
        msg = '마음 공부를 아주 잘 했어요! 하나님의 말씀을 마음에 잘 새기고 있네요.';
      } else if (pct >= 70) {
        emoji = '😊'; title = '잘했어요!';
        msg = '마음에 대해 많이 알고 있어요. 조금 더 공부하면 완벽해질 거예요!';
      } else if (pct >= 50) {
        emoji = '💪'; title = '괜찮아요!';
        msg = '더 열심히 성경을 읽으면 마음 공부 마스터가 될 수 있어요!';
      } else {
        emoji = '📖'; title = '다시 도전해봐요!';
        msg = '성경 말씀을 더 읽어보고 다시 도전해보세요. 하나님은 우리 마음을 사랑하세요!';
      }

      document.getElementById('result-emoji').textContent = emoji;
      document.getElementById('result-title').textContent = title;
      document.getElementById('result-score').textContent = score + ' / ' + (questions.length * 10);
      document.getElementById('result-msg').textContent = msg;
    }

    startGame();
  </script>
</body>
</html>
