<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Heart Quiz - Sunday School Games</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <div class="container">
    <div class="game-header">
      <a href="../../index.html" class="back-btn">←</a>
      <h2>❤️ Heart Quiz</h2>
    </div>

    <div class="score-bar">
      <span class="score">Score: <strong id="score">0</strong></span>
      <span class="progress" id="progress">1 / 10</span>
    </div>

    <div id="quiz-area">
      <div class="quiz-card">
        <p class="verse" id="verse"></p>
        <p class="question" id="question"></p>
        <div class="choices" id="choices"></div>
        <div class="explanation" id="explanation"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question →</button>
      </div>
    </div>

    <div id="result-area" style="display:none;">
      <div class="result-screen">
        <div class="emoji" id="result-emoji"></div>
        <h2 id="result-title"></h2>
        <div class="result-score" id="result-score"></div>
        <p class="result-msg" id="result-msg"></p>
        <div class="btn-group">
          <button class="retry-btn" onclick="startGame()">Try Again! 🔄</button>
          <a href="../../index.html" class="home-btn">Back to Home 🏠</a>
        </div>
      </div>

      <div class="quiz-card" style="margin-top:16px; text-align:left;">
        <h3 style="margin-bottom:12px;">📖 Today's Verse</h3>
        <p style="font-size:0.9rem; line-height:1.7; color:#555;">
          "Trust in the LORD with all your heart and lean not on your own understanding"
          <br><strong>— Proverbs 3:5</strong>
        </p>
      </div>
    </div>
  </div>

  <script>
    const allQuestions = [
      {
        verse: "Mark 7:21-23",
        question: "According to Jesus, where do the things that defile a person come from?",
        choices: ["From food", "From within the heart", "From other people", "From the environment"],
        answer: 1,
        explanation: "Jesus taught that evil thoughts, theft, murder, lies—all come from within a person's heart. That's why it's important to keep our hearts clean!"
      },
      {
        verse: "Luke 6:45",
        question: "What does a good person bring out of the good stored in their heart?",
        choices: ["Money", "Good things", "Bad things", "Nothing"],
        answer: 1,
        explanation: "If you store good things in your heart, good words and actions come out. Fill your heart's treasure chest with good things!"
      },
      {
        verse: "Proverbs 4:23",
        question: "According to Proverbs, what should you guard above all else?",
        choices: ["Wealth", "Health", "Your heart", "Friends"],
        answer: 2,
        explanation: "\"Above all else, guard your heart, for everything you do flows from it.\" The heart is the wellspring of life!"
      },
      {
        verse: "1 Samuel 16:7",
        question: "What does God look at in a person?",
        choices: ["Appearance", "The heart", "Talent", "Height"],
        answer: 1,
        explanation: "\"People look at the outward appearance, but the LORD looks at the heart.\" God sees our hearts, not our looks!"
      },
      {
        verse: "Jeremiah 29:13",
        question: "How should we seek God to find Him?",
        choices: ["By studying hard", "By seeking with all your heart", "By just going to church", "By pretending to be good"],
        answer: 1,
        explanation: "\"You will seek me and find me when you seek me with all your heart.\" God can be found when we seek Him sincerely!"
      },
      {
        verse: "Romans 10:9-10",
        question: "What must we do in our hearts to be saved?",
        choices: ["Worry", "Believe", "Doubt", "Ignore"],
        answer: 1,
        explanation: "\"If you believe in your heart that God raised him from the dead, you will be saved.\" Faith in the heart is the key to salvation!"
      },
      {
        verse: "Matthew 22:37",
        question: "What is the greatest commandment Jesus spoke of?",
        choices: ["Study hard", "Love God with all your heart", "Become rich", "Become famous"],
        answer: 1,
        explanation: "\"Love the Lord your God with all your heart and with all your soul and with all your mind.\" This is the greatest commandment!"
      },
      {
        verse: "1 Samuel 10:9",
        question: "What did God give to Saul?",
        choices: ["Much money", "A new heart", "A great army", "Good food"],
        answer: 1,
        explanation: "God gave Saul a new heart and he even prophesied. When we give our hearts to God, He transforms us!"
      },
      {
        verse: "Proverbs 3:5",
        question: "What should we do with all our heart?",
        choices: ["Trust ourselves", "Trust in the LORD", "Make money", "Worry"],
        answer: 1,
        explanation: "\"Trust in the LORD with all your heart and lean not on your own understanding.\" Trusting God before our own thoughts is wisdom!"
      },
      {
        verse: "Ezekiel 11:19",
        question: "What does God give us instead of a heart of stone?",
        choices: ["A heart of gold", "A heart of flesh (soft heart)", "A strong heart", "A cold heart"],
        answer: 1,
        explanation: "\"I will remove the heart of stone from their flesh and give them a heart of flesh.\" God turns hard hearts into soft, warm ones!"
      },
      {
        verse: "Galatians 5:22-23",
        question: "Which is NOT a fruit of the Spirit?",
        choices: ["Love, joy", "Anger, jealousy", "Gentleness, self-control", "Peace, patience"],
        answer: 1,
        explanation: "The fruit of the Spirit is love, joy, peace, patience, kindness, goodness, faithfulness, gentleness, and self-control. Let the Spirit bear fruit in your heart!"
      },
      {
        verse: "Psalm 51:10",
        question: "What did David ask God for?",
        choices: ["Money and power", "A clean heart", "Long life", "Revenge on enemies"],
        answer: 1,
        explanation: "\"Create in me a clean heart, O God, and renew a right spirit within me.\" A clean heart must be asked from God!"
      },
      {
        verse: "Matthew 5:8",
        question: "What is promised to those who are pure in heart?",
        choices: ["They will be rich", "They will see God", "They will be famous", "They will pass exams"],
        answer: 1,
        explanation: "\"Blessed are the pure in heart, for they will see God.\" Meet God with a clean heart!"
      },
      {
        verse: "1 Chronicles 28:9",
        question: "What does God search and examine in every person?",
        choices: ["Report cards", "The heart", "Bank accounts", "Social media"],
        answer: 1,
        explanation: "\"The LORD searches every heart and understands every desire and every thought.\" God knows even our innermost thoughts!"
      },
      {
        verse: "1 Samuel 15:22-23",
        question: "What happened to King Saul when he didn't follow God wholeheartedly?",
        choices: ["He became a greater king", "He lost his throne", "He became richer", "Nothing happened"],
        answer: 1,
        explanation: "Saul disobeyed God's command and ultimately lost his kingship. This shows how important it is to follow God with all our heart!"
      }
    ];

    let questions = [];
    let current = 0;
    let score = 0;
    let answered = false;

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function startGame() {
      questions = shuffle(allQuestions).slice(0, 10);
      current = 0;
      score = 0;
      answered = false;
      document.getElementById('quiz-area').style.display = 'block';
      document.getElementById('result-area').style.display = 'none';
      renderQuestion();
    }

    function renderQuestion() {
      const q = questions[current];
      document.getElementById('verse').textContent = '📖 ' + q.verse;
      document.getElementById('question').textContent = q.question;
      document.getElementById('score').textContent = score;
      document.getElementById('progress').textContent = (current + 1) + ' / ' + questions.length;

      const choicesEl = document.getElementById('choices');
      choicesEl.innerHTML = '';
      q.choices.forEach((c, i) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = c;
        btn.onclick = () => selectAnswer(i);
        choicesEl.appendChild(btn);
      });

      document.getElementById('explanation').className = 'explanation';
      document.getElementById('next-btn').className = 'next-btn';
      answered = false;
    }

    function selectAnswer(idx) {
      if (answered) return;
      answered = true;

      const q = questions[current];
      const btns = document.querySelectorAll('.choice-btn');

      btns.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.answer) btn.classList.add('correct');
        if (i === idx && idx !== q.answer) btn.classList.add('wrong');
      });

      if (idx === q.answer) score += 10;
      document.getElementById('score').textContent = score;

      const expEl = document.getElementById('explanation');
      expEl.textContent = '💡 ' + q.explanation;
      expEl.className = 'explanation show';

      const nextBtn = document.getElementById('next-btn');
      nextBtn.textContent = current < questions.length - 1 ? 'Next Question →' : 'See Results 🎉';
      nextBtn.className = 'next-btn show';
    }

    function nextQuestion() {
      current++;
      if (current >= questions.length) {
        showResult();
      } else {
        renderQuestion();
      }
    }

    function showResult() {
      document.getElementById('quiz-area').style.display = 'none';
      document.getElementById('result-area').style.display = 'block';

      const pct = score / (questions.length * 10) * 100;
      let emoji, title, msg;

      if (pct >= 90) {
        emoji = '🌟'; title = 'Amazing!';
        msg = "You really know the heart well! You're keeping God's Word close to your heart.";
      } else if (pct >= 70) {
        emoji = '😊'; title = 'Well done!';
        msg = "You know a lot about the heart. A little more study and you'll be perfect!";
      } else if (pct >= 50) {
        emoji = '💪'; title = 'Not bad!';
        msg = 'Keep reading the Bible and you can become a heart expert!';
      } else {
        emoji = '📖'; title = 'Try again!';
        msg = "Read more of God's Word and try again. God loves our hearts!";
      }

      document.getElementById('result-emoji').textContent = emoji;
      document.getElementById('result-title').textContent = title;
      document.getElementById('result-score').textContent = score + ' / ' + (questions.length * 10);
      document.getElementById('result-msg').textContent = msg;
    }

    startGame();
  </script>
</body>
</html>
