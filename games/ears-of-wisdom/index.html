<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ears of Wisdom - Sunday School Games</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .house-scene {
      position: relative;
      height: 180px;
      background: linear-gradient(180deg, #87CEEB 60%, #DEB887 100%);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
      box-shadow: var(--card-shadow);
    }

    .house-scene .ground-rock {
      position: absolute;
      bottom: 0;
      left: 10%;
      width: 35%;
      height: 40px;
      background: linear-gradient(180deg, #8B7355, #6B5B45);
      border-radius: 8px 8px 0 0;
    }

    .house-scene .ground-sand {
      position: absolute;
      bottom: 0;
      right: 10%;
      width: 35%;
      height: 30px;
      background: linear-gradient(180deg, #F4D03F, #DAA520);
      border-radius: 8px 8px 0 0;
    }

    .house-scene .house {
      position: absolute;
      bottom: 35px;
      width: 60px;
      text-align: center;
      transition: all 0.5s;
    }

    .house-scene .house.rock-house {
      left: calc(10% + 17.5% - 30px);
    }

    .house-scene .house.sand-house {
      right: calc(10% + 17.5% - 30px);
    }

    .house-scene .house .house-icon {
      font-size: 2.5rem;
      transition: transform 0.5s;
    }

    .house-scene .house.sand-house.shaking .house-icon {
      animation: houseShake 0.5s;
    }

    .house-scene .house.rock-house.growing .house-icon {
      animation: houseGrow 0.5s;
    }

    .house-scene .label {
      position: absolute;
      bottom: 4px;
      font-family: 'Jua', sans-serif;
      font-size: 0.7rem;
      color: #fff;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    .house-scene .label.rock-label {
      left: 10%;
      width: 35%;
      text-align: center;
    }

    .house-scene .label.sand-label {
      right: 10%;
      width: 35%;
      text-align: center;
    }

    .house-scene .rain {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .house-scene .rain.active {
      opacity: 1;
    }

    .house-scene .raindrop {
      position: absolute;
      width: 2px;
      height: 12px;
      background: rgba(255,255,255,0.6);
      animation: rainFall 0.6s linear infinite;
    }

    @keyframes rainFall {
      to { transform: translateY(200px); }
    }

    @keyframes houseShake {
      0%, 100% { transform: rotate(0); }
      20% { transform: rotate(-8deg); }
      40% { transform: rotate(8deg); }
      60% { transform: rotate(-5deg); }
      80% { transform: rotate(5deg); }
    }

    @keyframes houseGrow {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .wisdom-meter {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border-radius: 12px;
      padding: 10px 14px;
      box-shadow: var(--card-shadow);
      margin-bottom: 16px;
    }

    .wisdom-meter .meter-label {
      font-family: 'Jua', sans-serif;
      font-size: 0.8rem;
      color: var(--ears-color);
      white-space: nowrap;
    }

    .wisdom-meter .meter-track {
      flex: 1;
      height: 10px;
      background: #ecf0f1;
      border-radius: 5px;
      overflow: hidden;
    }

    .wisdom-meter .meter-fill {
      height: 100%;
      background: linear-gradient(90deg, #e74c3c, #f39c12, #27ae60);
      border-radius: 5px;
      transition: width 0.4s ease;
    }

    .statement-card {
      background: #fff;
      border-radius: 16px;
      padding: 28px 20px;
      box-shadow: var(--card-shadow);
      margin-bottom: 16px;
      text-align: center;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: border-color 0.3s;
      border: 3px solid transparent;
    }

    .statement-card .speaker {
      font-size: 2rem;
      margin-bottom: 12px;
    }

    .statement-card .statement-text {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .statement-card .source {
      font-size: 0.78rem;
      color: #95a5a6;
      font-style: italic;
    }

    .judge-btns {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .judge-btn {
      flex: 1;
      padding: 16px 12px;
      border: 3px solid;
      border-radius: 14px;
      background: #fff;
      font-family: 'Jua', sans-serif;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .judge-btn:active { transform: scale(0.96); }

    .judge-btn .btn-icon { font-size: 1.8rem; }

    .judge-btn.rock-btn {
      border-color: #9b59b6;
      color: #9b59b6;
    }

    .judge-btn.rock-btn:active { background: #f3e5f5; }

    .judge-btn.sand-btn {
      border-color: #e67e22;
      color: #e67e22;
    }

    .judge-btn.sand-btn:active { background: #fef5e7; }

    .judge-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .feedback-toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: #fff;
      border-radius: 20px;
      padding: 24px 28px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
      text-align: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s;
      max-width: 320px;
      width: 85%;
    }

    .feedback-toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .feedback-toast.correct { border: 3px solid #27ae60; }
    .feedback-toast.wrong { border: 3px solid #e74c3c; }

    .feedback-toast .toast-emoji { font-size: 2.5rem; margin-bottom: 8px; }
    .feedback-toast .toast-text { font-size: 0.88rem; line-height: 1.6; color: #555; }
    .feedback-toast .toast-verse { font-size: 0.78rem; color: #95a5a6; margin-top: 8px; font-style: italic; }

    .overlay-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.3);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .overlay-bg.show { opacity: 1; }

    .result-screen .retry-btn { background: var(--ears-color); }
    .result-screen .result-score { color: var(--ears-color); }

    .next-btn { background: var(--ears-color) !important; }

    .ear-dots {
      display: flex;
      justify-content: center;
      gap: 5px;
      margin-bottom: 12px;
    }

    .ear-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ecf0f1;
      transition: all 0.3s;
      font-size: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ear-dot.correct { background: #27ae60; }
    .ear-dot.wrong { background: #e74c3c; }
  </style>
</head>
<body>
  <div class="container">
    <div class="game-header">
      <a href="../../index.html" class="back-btn">&larr;</a>
      <h2>👂 Ears of Wisdom</h2>
    </div>

    <div class="score-bar">
      <span class="score" style="color:var(--ears-color);">Score: <strong id="score">0</strong></span>
      <span class="progress" id="progress">1 / 12</span>
    </div>

    <div id="game-area">
      <div class="house-scene" id="house-scene">
        <div class="rain" id="rain"></div>
        <div class="house rock-house" id="rock-house">
          <div class="house-icon">🏠</div>
        </div>
        <div class="house sand-house" id="sand-house">
          <div class="house-icon">🏚️</div>
        </div>
        <div class="ground-rock"></div>
        <div class="ground-sand"></div>
        <div class="label rock-label">⛰️ Rock</div>
        <div class="label sand-label">🏖️ Sand</div>
      </div>

      <div class="wisdom-meter">
        <span class="meter-label">👂 Discernment</span>
        <div class="meter-track">
          <div class="meter-fill" id="meter-fill" style="width:50%;"></div>
        </div>
      </div>

      <div class="ear-dots" id="ear-dots"></div>

      <div class="statement-card" id="statement-card">
        <div class="speaker" id="speaker"></div>
        <div class="statement-text" id="statement-text"></div>
        <div class="source" id="source"></div>
      </div>

      <div class="judge-btns">
        <button class="judge-btn rock-btn" onclick="judge('truth')">
          <span class="btn-icon">⛰️</span>
          True Teaching
        </button>
        <button class="judge-btn sand-btn" onclick="judge('false')">
          <span class="btn-icon">🏖️</span>
          False Teaching
        </button>
      </div>
    </div>

    <div id="result-area" style="display:none;">
      <div class="result-screen">
        <div class="emoji" id="result-emoji"></div>
        <h2 id="result-title"></h2>
        <div class="result-score" id="result-score"></div>
        <p class="result-msg" id="result-msg"></p>
        <div class="btn-group">
          <button class="retry-btn" onclick="startGame()">Try Again! 🔄</button>
          <a href="../../index.html" class="home-btn">Back to Home 🏠</a>
        </div>
      </div>

      <div class="quiz-card" style="margin-top:16px; text-align:left;">
        <h3 style="margin-bottom:12px;">📖 Today's Verse</h3>
        <p style="font-size:0.9rem; line-height:1.7; color:#555;">
          "Turning your ear to wisdom and applying your heart to understanding"
          <br><strong>— Proverbs 2:2</strong>
        </p>
        <p style="font-size:0.85rem; line-height:1.7; color:#555; margin-top:12px;">
          "The heart of the discerning acquires knowledge, for the ears of the wise seek it out"
          <br><strong>— Proverbs 18:15</strong>
        </p>
      </div>
    </div>
  </div>

  <div class="overlay-bg" id="overlay-bg"></div>
  <div class="feedback-toast" id="feedback-toast">
    <div class="toast-emoji" id="toast-emoji"></div>
    <div class="toast-text" id="toast-text"></div>
    <div class="toast-verse" id="toast-verse"></div>
  </div>

  <script>
    const allStatements = [
      // True teachings (truth)
      {
        text: "Those who hear God's Word and put it into practice are like a person who built their house on the rock.",
        type: "truth",
        feedback: "This is what Jesus taught directly! It's not enough to just listen—we must also act on it.",
        verse: "Matthew 7:24"
      },
      {
        text: "The seed on good soil represents those who hear the word, understand it, and bear fruit.",
        type: "truth",
        feedback: "In the Parable of the Sower, the good soil represents those who listen carefully and put God's Word into practice!",
        verse: "Luke 8:15"
      },
      {
        text: "God loves everyone, and gives eternal life to whoever believes.",
        type: "truth",
        feedback: "This is the heart of John 3:16! God's love is for all people.",
        verse: "John 3:16"
      },
      {
        text: "The beginning of wisdom is the fear of the LORD.",
        type: "truth",
        feedback: "Knowing and revering God first is the starting point of all wisdom!",
        verse: "Proverbs 9:10"
      },
      {
        text: "Love one another. This is my commandment.",
        type: "truth",
        feedback: "This is Jesus' new commandment. Loving one another is God's will!",
        verse: "John 13:34"
      },
      {
        text: "Love your neighbor as yourself.",
        type: "truth",
        feedback: "This is the second greatest commandment. It means to value others as much as yourself!",
        verse: "Matthew 22:39"
      },
      {
        text: "Whoever has ears, let them hear! Hear what the Spirit says to the churches.",
        type: "truth",
        feedback: "This means to pay attention to God's Word. Listening is where discernment begins!",
        verse: "Revelation 2:7"
      },
      {
        text: "The rain came down, the winds blew, but the house on the rock did not fall.",
        type: "truth",
        feedback: "A life built on God's Word will not be shaken by any trial!",
        verse: "Matthew 7:25"
      },
      {
        text: "If you have faith as small as a mustard seed, nothing will be impossible for you.",
        type: "truth",
        feedback: "Even the tiniest faith can move mountains when it's placed in God!",
        verse: "Matthew 17:20"
      },
      // False teachings (false)
      {
        text: "You just need to hear God's Word. You don't actually need to practice it.",
        type: "false",
        feedback: "Hearing without doing is like building a house on sand! We must hear AND do.",
        verse: "Matthew 7:26"
      },
      {
        text: "I'm great on my own. I don't need God's help.",
        type: "false",
        feedback: "Pride comes before a fall. Every good thing comes from God!",
        verse: "Proverbs 16:18"
      },
      {
        text: "Just listen to whatever sounds good and makes you feel comfortable.",
        type: "false",
        feedback: "This is exactly what 2 Timothy warns about! We shouldn't prefer pleasant words over truth.",
        verse: "2 Timothy 4:3-4"
      },
      {
        text: "As long as you do good deeds, you don't need to believe in God.",
        type: "false",
        feedback: "Good deeds are important, but salvation is a gift from God received through faith!",
        verse: "Ephesians 2:8-9"
      },
      {
        text: "The Bible is just an old story. It doesn't matter anymore.",
        type: "false",
        feedback: "God's Word is alive and powerful forever! He still speaks to us today.",
        verse: "Hebrews 4:12"
      },
      {
        text: "Living my own way is the best. God's way is boring.",
        type: "false",
        feedback: "Living your own way is like building on sand. God's way is always the best path!",
        verse: "Proverbs 14:12"
      },
      {
        text: "It's fine to follow bad friends. I won't change.",
        type: "false",
        feedback: "Bad company will eventually influence you. Who you listen to matters!",
        verse: "Proverbs 13:20"
      },
      {
        text: "You don't need to pray. God knows everything anyway.",
        type: "false",
        feedback: "God does know everything, but prayer is precious time talking with God!",
        verse: "1 Thessalonians 5:17"
      },
      {
        text: "Everyone else is doing it, so it must be okay. The majority is always right.",
        type: "false",
        feedback: "What the majority does isn't always right. God's Word is the standard!",
        verse: "Romans 12:2"
      }
    ];

    let statements = [];
    let current = 0;
    let score = 0;
    let wisdomLevel = 50;
    let results = [];
    let isProcessing = false;
    const TOTAL = 12;

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function initRain() {
      const rain = document.getElementById('rain');
      rain.innerHTML = '';
      for (let i = 0; i < 20; i++) {
        const drop = document.createElement('div');
        drop.className = 'raindrop';
        drop.style.left = Math.random() * 100 + '%';
        drop.style.animationDelay = Math.random() * 0.6 + 's';
        drop.style.top = -Math.random() * 20 + 'px';
        rain.appendChild(drop);
      }
    }

    function startGame() {
      const truths = shuffle(allStatements.filter(s => s.type === 'truth')).slice(0, 6);
      const falses = shuffle(allStatements.filter(s => s.type === 'false')).slice(0, 6);
      statements = shuffle([...truths, ...falses]);
      current = 0;
      score = 0;
      wisdomLevel = 50;
      results = [];
      isProcessing = false;
      document.getElementById('game-area').style.display = 'block';
      document.getElementById('result-area').style.display = 'none';
      initRain();
      updateDots();
      renderStatement();
    }

    function updateDots() {
      const container = document.getElementById('ear-dots');
      container.innerHTML = '';
      for (let i = 0; i < TOTAL; i++) {
        const dot = document.createElement('div');
        dot.className = 'ear-dot';
        if (i < results.length) {
          dot.classList.add(results[i] ? 'correct' : 'wrong');
        }
        container.appendChild(dot);
      }
    }

    function renderStatement() {
      const s = statements[current];
      document.getElementById('speaker').textContent = '🗣️';
      document.getElementById('statement-text').textContent = s.text;
      document.getElementById('source').textContent = 'Is this true or false?';
      document.getElementById('score').textContent = score;
      document.getElementById('progress').textContent = (current + 1) + ' / ' + TOTAL;
      document.getElementById('meter-fill').style.width = wisdomLevel + '%';

      const card = document.getElementById('statement-card');
      card.style.borderColor = 'transparent';

      document.querySelectorAll('.judge-btn').forEach(b => b.disabled = false);
    }

    function judge(choice) {
      if (isProcessing) return;
      isProcessing = true;

      const s = statements[current];
      const isCorrect = (choice === 'truth' && s.type === 'truth') || (choice === 'false' && s.type === 'false');

      const card = document.getElementById('statement-card');
      card.style.borderColor = isCorrect ? '#27ae60' : '#e74c3c';

      document.querySelectorAll('.judge-btn').forEach(b => b.disabled = true);

      if (isCorrect) {
        score += 10;
        wisdomLevel = Math.min(100, wisdomLevel + 6);
        results.push(true);
        // Rock house grows
        document.getElementById('rock-house').classList.add('growing');
        setTimeout(() => document.getElementById('rock-house').classList.remove('growing'), 500);
      } else {
        wisdomLevel = Math.max(0, wisdomLevel - 8);
        results.push(false);
        // Sand house shakes, rain
        document.getElementById('sand-house').classList.add('shaking');
        document.getElementById('rain').classList.add('active');
        setTimeout(() => {
          document.getElementById('sand-house').classList.remove('shaking');
          document.getElementById('rain').classList.remove('active');
        }, 600);
      }

      updateDots();

      // Show feedback
      const toast = document.getElementById('feedback-toast');
      const bg = document.getElementById('overlay-bg');

      document.getElementById('toast-emoji').textContent = isCorrect ? '✅' : '❌';
      document.getElementById('toast-text').textContent = s.feedback;
      document.getElementById('toast-verse').textContent = '📖 ' + s.verse;

      toast.className = 'feedback-toast show ' + (isCorrect ? 'correct' : 'wrong');
      bg.classList.add('show');

      setTimeout(() => {
        toast.className = 'feedback-toast';
        bg.classList.remove('show');

        current++;
        if (current >= TOTAL) {
          showResult();
        } else {
          renderStatement();
          isProcessing = false;
        }
      }, 2200);
    }

    function showResult() {
      document.getElementById('game-area').style.display = 'none';
      document.getElementById('result-area').style.display = 'block';

      const pct = score / (TOTAL * 10) * 100;
      let emoji, title, msg;

      if (pct >= 90) {
        emoji = '🌟'; title = 'You have ears of wisdom!';
        msg = 'You can perfectly discern true from false teaching! You are a wise person who built their house on the rock!';
      } else if (pct >= 70) {
        emoji = '😊'; title = 'Listening well!';
        msg = 'You discerned most of them correctly! Just a little more and you\'ll be perfect.';
      } else if (pct >= 50) {
        emoji = '💪'; title = 'Keep practicing!';
        msg = 'You\'re training your ears to discern. Read more of God\'s Word and you\'ll get better!';
      } else {
        emoji = '📖'; title = 'Try again!';
        msg = 'Read the story of the house on the rock in Matthew 7 and try again!';
      }

      document.getElementById('result-emoji').textContent = emoji;
      document.getElementById('result-title').textContent = title;
      document.getElementById('result-score').textContent = score + ' / ' + (TOTAL * 10);
      document.getElementById('result-msg').textContent = msg;
    }

    startGame();
  </script>
</body>
</html>
