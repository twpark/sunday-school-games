<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Helping Hands - Sunday School Games</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .round-card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--card-shadow);
      margin-bottom: 16px;
    }

    .round-card .round-title {
      font-family: 'Jua', sans-serif;
      font-size: 1.1rem;
      text-align: center;
      margin-bottom: 12px;
      color: var(--hands-color);
    }

    .round-card .story-text {
      font-size: 0.88rem;
      color: #555;
      line-height: 1.6;
      text-align: center;
      margin-bottom: 16px;
    }

    .round-card .story-verse {
      font-size: 0.78rem;
      color: #95a5a6;
      text-align: center;
      font-style: italic;
    }

    .answer-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 16px;
    }

    .answer-btn {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #ecf0f1;
      border-radius: 12px;
      background: #fff;
      font-size: 0.92rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      font-family: 'Noto Sans KR', sans-serif;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .answer-btn:active { transform: scale(0.98); }

    .answer-btn .btn-emoji { font-size: 1.3rem; }

    .answer-btn.correct {
      border-color: #27ae60;
      background: #e8f8f0;
      color: #27ae60;
      font-weight: 700;
    }

    .answer-btn.wrong {
      border-color: #e74c3c;
      background: #fdecea;
      color: #e74c3c;
    }

    .answer-btn:disabled {
      cursor: default;
      opacity: 0.7;
    }

    .explanation {
      margin-top: 16px;
      padding: 16px;
      background: #eaf6fd;
      border-radius: 12px;
      font-size: 0.85rem;
      line-height: 1.6;
      text-align: left;
      display: none;
    }

    .explanation.show { display: block; }

    .next-btn {
      background: var(--hands-color) !important;
    }

    .result-screen .retry-btn {
      background: var(--hands-color);
    }

    .result-screen .result-score {
      color: var(--hands-color);
    }

    .hands-counter {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-bottom: 12px;
    }

    .hand-icon {
      font-size: 1.5rem;
      opacity: 0.3;
      transition: opacity 0.3s;
    }

    .hand-icon.active { opacity: 1; }
  </style>
</head>
<body>
  <div class="container">
    <div class="game-header">
      <a href="../../index.html" class="back-btn">←</a>
      <h2>🤲 Helping Hands</h2>
    </div>

    <div class="score-bar">
      <span class="score" style="color:var(--hands-color);">Score: <strong id="score">0</strong></span>
      <span class="progress" id="progress">1 / 10</span>
    </div>

    <div id="game-area">
      <div class="hands-counter" id="hands-counter"></div>

      <div class="round-card">
        <div class="round-title" id="round-title"></div>
        <div class="story-text" id="story-text"></div>
        <div class="story-verse" id="story-verse"></div>

        <div class="answer-options" id="answer-options"></div>
        <div class="explanation" id="explanation"></div>
        <button class="next-btn" id="next-btn" onclick="nextRound()">Next Question →</button>
      </div>
    </div>

    <div id="result-area" style="display:none;">
      <div class="result-screen">
        <div class="emoji" id="result-emoji"></div>
        <h2 id="result-title"></h2>
        <div class="result-score" id="result-score"></div>
        <p class="result-msg" id="result-msg"></p>
        <div class="btn-group">
          <button class="retry-btn" onclick="startGame()">Try Again! 🔄</button>
          <a href="../../index.html" class="home-btn">Back to Home 🏠</a>
        </div>
      </div>

      <div class="quiz-card" style="margin-top:16px; text-align:left;">
        <h3 style="margin-bottom:12px;">📖 Today's Verse</h3>
        <p style="font-size:0.9rem; line-height:1.7; color:#555;">
          "Whatever your hand finds to do, do it with all your might"
          <br><strong>— Ecclesiastes 9:10</strong>
        </p>
        <p style="font-size:0.85rem; line-height:1.7; color:#555; margin-top:12px;">
          "Each of you should use whatever gift you have received to serve others, as faithful stewards of God's grace in its various forms"
          <br><strong>— 1 Peter 4:10</strong>
        </p>
      </div>
    </div>
  </div>

  <script>
    const allQuestions = [
      {
        title: "🏔️ Moses' Battle Support",
        story: "When Amalek attacked Israel, Israel was winning when Moses raised his hands, and losing when he lowered them. Who helped when Moses' arms grew tired?",
        verse: "📖 Exodus 17:8-14",
        choices: [
          { emoji: "👥", text: "Aaron and Hur supported his arms on each side", correct: true },
          { emoji: "⚔️", text: "Joshua defeated all enemies alone", correct: false },
          { emoji: "🏃", text: "Moses endured alone without rest", correct: false },
          { emoji: "🪨", text: "No one helped", correct: false }
        ],
        explanation: "Aaron and Hur supported Moses' arms from each side. Behind-the-scenes help is just as important as fighting in battle! We can be helping hands too."
      },
      {
        title: "⚔️ David's Sharing of Spoils",
        story: "When David returned victorious from battle, what did he do with the spoils for the 200 soldiers who were too exhausted to fight?",
        verse: "📖 1 Samuel 30:18-25",
        choices: [
          { emoji: "🤝", text: "He shared equally with those who fought", correct: true },
          { emoji: "🚫", text: "He gave them nothing", correct: false },
          { emoji: "💰", text: "He gave them only half", correct: false },
          { emoji: "😡", text: "He punished them", correct: false }
        ],
        explanation: "David shared the spoils equally between those who fought and those who guarded the supplies. Every role is equally valuable!"
      },
      {
        title: "💧 The Value of a Cup of Water",
        story: "Jesus said what happens if someone gives even a cup of cold water in a disciple's name?",
        verse: "📖 Matthew 10:41-42",
        choices: [
          { emoji: "🎁", text: "They will certainly not lose their reward", correct: true },
          { emoji: "🤷", text: "It means nothing", correct: false },
          { emoji: "📝", text: "You need to do bigger things to get a reward", correct: false },
          { emoji: "⏳", text: "They must pay it back later", correct: false }
        ],
        explanation: "God sees even the smallest acts of kindness! Even a cup of water given sincerely brings God's joy and reward."
      },
      {
        title: "🩹 The Good Samaritan",
        story: "A man was beaten by robbers. A priest and a Levite passed by. Who stopped to help?",
        verse: "📖 Luke 10:30-37",
        choices: [
          { emoji: "💛", text: "A Samaritan treated his wounds and paid for his lodging", correct: true },
          { emoji: "🏛️", text: "The priest came back to help", correct: false },
          { emoji: "👀", text: "The Levite prayed from a distance", correct: false },
          { emoji: "🏃", text: "Nobody helped", correct: false }
        ],
        explanation: "The Samaritan helped despite being from a different nation. A true neighbor reaches out to anyone in need!"
      },
      {
        title: "🍞 The Widow Who Fed Elijah",
        story: "During a drought, what did the widow of Zarephath do with her last oil and flour?",
        verse: "📖 1 Kings 17:8-16",
        choices: [
          { emoji: "🤲", text: "She made bread for Elijah first", correct: true },
          { emoji: "🏠", text: "She refused and fed only herself and her son", correct: false },
          { emoji: "🏪", text: "She went to the market to buy more", correct: false },
          { emoji: "😢", text: "She cried and did nothing", correct: false }
        ],
        explanation: "The widow shared her last food with God's servant, and God made sure her oil and flour never ran out. Sharing brings God's blessing!"
      },
      {
        title: "🦶 Jesus Washes Feet",
        story: "At the Last Supper, what did Jesus do for His disciples?",
        verse: "📖 John 13:1-17",
        choices: [
          { emoji: "💧", text: "He personally washed their feet", correct: true },
          { emoji: "👑", text: "He sat on a throne", correct: false },
          { emoji: "📜", text: "He gave a long sermon", correct: false },
          { emoji: "🍷", text: "He only shared wine", correct: false }
        ],
        explanation: "Jesus, the Son of God, performed a servant's task of washing feet. Service is the highest form of leadership!"
      },
      {
        title: "🧺 Dorcas' Hands",
        story: "What was Dorcas (Tabitha) of Joppa known for?",
        verse: "📖 Acts 9:36-42",
        choices: [
          { emoji: "🧵", text: "She made clothes for poor widows", correct: true },
          { emoji: "💰", text: "She invested for the wealthy", correct: false },
          { emoji: "📢", text: "She gave speeches in the plaza", correct: false },
          { emoji: "🏛️", text: "She built a temple", correct: false }
        ],
        explanation: "Dorcas used her own hands to make clothes for the poor. Small acts of service done with our hands can become great love!"
      },
      {
        title: "🏠 Martha's Service",
        story: "When Jesus visited Martha and Mary's home, what did Martha do?",
        verse: "📖 Luke 10:38-42",
        choices: [
          { emoji: "🍳", text: "She prepared food to serve the guest", correct: true },
          { emoji: "📖", text: "She read the Bible", correct: false },
          { emoji: "😴", text: "She was resting", correct: false },
          { emoji: "🏃", text: "She went outside", correct: false }
        ],
        explanation: "Martha served by preparing food. Service is important, but Jesus also taught that listening to God's Word matters too. Balance is key!"
      },
      {
        title: "👦 The Boy's Lunch",
        story: "When 5,000 people were hungry, how did a young boy help?",
        verse: "📖 John 6:1-14",
        choices: [
          { emoji: "🐟", text: "He gave Jesus 5 loaves and 2 fish", correct: true },
          { emoji: "🏃", text: "He ran to a bakery to buy bread", correct: false },
          { emoji: "🤐", text: "He hid his lunch", correct: false },
          { emoji: "😥", text: "He ate it all himself", correct: false }
        ],
        explanation: "The boy willingly offered his small lunch, and Jesus fed 5,000 people with it! Even small sharing becomes a great miracle in God's hands."
      },
      {
        title: "🫗 The Poor Widow's Offering",
        story: "When rich people gave large offerings at the temple, what did the poor widow do?",
        verse: "📖 Mark 12:41-44",
        choices: [
          { emoji: "💝", text: "She gave two small coins—all she had", correct: true },
          { emoji: "🙈", text: "She was too embarrassed to give", correct: false },
          { emoji: "💰", text: "She gave more than the rich", correct: false },
          { emoji: "😤", text: "She envied the rich", correct: false }
        ],
        explanation: "Jesus said the widow gave the most. It's not about how much you give, but giving with all your heart!"
      },
      {
        title: "💪 Nehemiah's Wall Rebuilding",
        story: "When Nehemiah rebuilt the walls of Jerusalem, what did the people do?",
        verse: "📖 Nehemiah 3-4",
        choices: [
          { emoji: "🧱", text: "Each person took responsibility for the section near their home", correct: true },
          { emoji: "👷", text: "Nehemiah built it all alone", correct: false },
          { emoji: "💤", text: "They gave up because it was too hard", correct: false },
          { emoji: "💵", text: "They hired foreigners to do it", correct: false }
        ],
        explanation: "Everyone worked together on their assigned section and completed the wall in just 52 days! When we join forces, we can accomplish what seems impossible."
      },
      {
        title: "🧤 Ruth's Devotion",
        story: "When Naomi returned to her homeland, what did Ruth do?",
        verse: "📖 Ruth 1:16-17",
        choices: [
          { emoji: "🤝", text: "She stayed with Naomi and provided for her by gleaning grain", correct: true },
          { emoji: "👋", text: "She said goodbye and went home", correct: false },
          { emoji: "💰", text: "She just sent money", correct: false },
          { emoji: "😢", text: "She just cried", correct: false }
        ],
        explanation: "Ruth said 'Your God will be my God' and stayed with Naomi to the end. She gleaned grain to feed the family, and God blessed her as an ancestor of Jesus!"
      }
    ];

    let questions = [];
    let current = 0;
    let score = 0;
    let answered = false;
    const TOTAL_ROUNDS = 10;

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function startGame() {
      questions = shuffle(allQuestions).slice(0, TOTAL_ROUNDS);
      current = 0;
      score = 0;
      answered = false;
      document.getElementById('game-area').style.display = 'block';
      document.getElementById('result-area').style.display = 'none';
      renderRound();
    }

    function updateHands() {
      const container = document.getElementById('hands-counter');
      container.innerHTML = '';
      for (let i = 0; i < TOTAL_ROUNDS; i++) {
        const hand = document.createElement('span');
        hand.className = 'hand-icon' + (i < current + 1 ? ' active' : '');
        hand.textContent = '🤲';
        container.appendChild(hand);
      }
    }

    function renderRound() {
      const q = questions[current];
      document.getElementById('round-title').textContent = q.title;
      document.getElementById('story-text').textContent = q.story;
      document.getElementById('story-verse').textContent = q.verse;
      document.getElementById('score').textContent = score;
      document.getElementById('progress').textContent = (current + 1) + ' / ' + TOTAL_ROUNDS;

      const optionsEl = document.getElementById('answer-options');
      optionsEl.innerHTML = '';

      const shuffled = shuffle(q.choices.map((c, i) => ({ ...c, origIdx: i })));

      shuffled.forEach((c) => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.innerHTML = '<span class="btn-emoji">' + c.emoji + '</span><span>' + c.text + '</span>';
        btn.onclick = () => selectAnswer(btn, c.correct);
        optionsEl.appendChild(btn);
      });

      document.getElementById('explanation').className = 'explanation';
      document.getElementById('next-btn').className = 'next-btn';
      answered = false;
      updateHands();
    }

    function selectAnswer(btn, isCorrect) {
      if (answered) return;
      answered = true;

      const btns = document.querySelectorAll('.answer-btn');
      btns.forEach(b => {
        b.disabled = true;
        const bCorrect = questions[current].choices.find(c => c.text === b.querySelector('span:last-child').textContent);
        if (bCorrect && bCorrect.correct) b.classList.add('correct');
      });

      if (isCorrect) {
        btn.classList.add('correct');
        score += 10;
      } else {
        btn.classList.add('wrong');
      }

      document.getElementById('score').textContent = score;

      const expEl = document.getElementById('explanation');
      expEl.textContent = '🤲 ' + questions[current].explanation;
      expEl.className = 'explanation show';

      const nextBtn = document.getElementById('next-btn');
      nextBtn.textContent = current < TOTAL_ROUNDS - 1 ? 'Next Question →' : 'See Results 🎉';
      nextBtn.className = 'next-btn show';
    }

    function nextRound() {
      current++;
      if (current >= TOTAL_ROUNDS) {
        showResult();
      } else {
        renderRound();
      }
    }

    function showResult() {
      document.getElementById('game-area').style.display = 'none';
      document.getElementById('result-area').style.display = 'block';

      const pct = score / (TOTAL_ROUNDS * 10) * 100;
      let emoji, title, msg;

      if (pct >= 90) {
        emoji = '🌟'; title = 'Service Champion!';
        msg = 'You know the Bible\'s service stories very well! "Whatever your hand finds to do, do it with all your might." (Ecclesiastes 9:10)';
      } else if (pct >= 70) {
        emoji = '😊'; title = 'Warm Hands!';
        msg = 'Your heart for service overflows! A little more study and you\'ll be a service master!';
      } else if (pct >= 50) {
        emoji = '💪'; title = 'Not bad!';
        msg = 'The Bible is full of beautiful service stories. Read more and you\'ll know even more!';
      } else {
        emoji = '📖'; title = 'Try again!';
        msg = 'Read more Bible stories about service and try again. Even small help is great love!';
      }

      document.getElementById('result-emoji').textContent = emoji;
      document.getElementById('result-title').textContent = title;
      document.getElementById('result-score').textContent = score + ' / ' + (TOTAL_ROUNDS * 10);
      document.getElementById('result-msg').textContent = msg;
    }

    startGame();
  </script>
</body>
</html>
