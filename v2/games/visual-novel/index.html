<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Prodigal's Choice — Sunday School Games</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    /* Visual Novel — page-specific overrides */
    .vn-illustration {
      position: relative;
      height: 220px;
      transition: background 0.5s ease;
    }

    .vn-illustration.scene-home {
      background: linear-gradient(135deg, #ffeaa7, #fdcb6e);
    }
    .vn-illustration.scene-far {
      background: linear-gradient(135deg, #e17055, #d63031);
    }
    .vn-illustration.scene-faithful {
      background: linear-gradient(135deg, #55efc4, #00b894);
    }
    .vn-illustration.scene-famine {
      background: linear-gradient(135deg, #636e72, #2d3436);
    }
    .vn-illustration.scene-prayer {
      background: linear-gradient(135deg, #a29bfe, #6c5ce7);
    }
    .vn-illustration.scene-road {
      background: linear-gradient(135deg, #fdcb6e, #e17055);
    }
    .vn-illustration.scene-pride {
      background: linear-gradient(135deg, #2d3436, #636e72);
    }
    .vn-illustration.scene-love {
      background: linear-gradient(135deg, #fd79a8, #e84393);
    }
    .vn-illustration.scene-ending {
      background: linear-gradient(135deg, #00b894, #00cec9);
    }

    .vn-illustration .emoji {
      font-size: 5rem;
      animation: emojiPulse 2s ease-in-out infinite;
    }

    @keyframes emojiPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .vn-scene {
      animation: fadeInScene 0.5s ease;
    }

    @keyframes fadeInScene {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .vn-dialogue {
      font-size: 1.05rem;
      line-height: 1.75;
    }

    .vn-verse {
      font-size: 0.88rem;
      line-height: 1.6;
    }

    .vn-teaching {
      font-size: 0.92rem;
      line-height: 1.6;
      padding: 12px 16px;
      background: linear-gradient(135deg, #e8f8f0, #dfe6e9);
      border-left: 4px solid var(--novel-color);
      border-radius: 8px;
      margin-bottom: 16px;
      color: #2d3436;
    }

    .vn-choice-btn {
      font-size: 1rem;
      padding: 16px 18px;
    }

    .vn-choice-btn:hover {
      border-color: var(--novel-color);
      background: #e8f8f0;
    }

    .vn-continue-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: var(--novel-color);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Jua', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .vn-continue-btn:active { opacity: 0.8; }

    /* Holiness Score Bar */
    .holiness-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 16px;
      box-shadow: var(--card-shadow);
      font-size: 0.9rem;
    }

    .holiness-bar .label {
      font-family: 'Jua', sans-serif;
      color: var(--novel-color);
      white-space: nowrap;
    }

    .holiness-bar .bar-track {
      flex: 1;
      height: 10px;
      background: #ecf0f1;
      border-radius: 5px;
      overflow: hidden;
    }

    .holiness-bar .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--novel-color), #55efc4);
      border-radius: 5px;
      transition: width 0.6s ease;
      width: 0%;
    }

    .holiness-bar .bar-value {
      font-weight: 700;
      color: var(--novel-color);
      min-width: 36px;
      text-align: right;
    }

    /* Result Screen Customization */
    .vn-result .ending-title {
      font-family: 'Jua', sans-serif;
      font-size: 1.6rem;
      margin-bottom: 6px;
      color: var(--text-color);
    }

    .vn-result .ending-subtitle {
      font-size: 1rem;
      color: var(--novel-color);
      font-weight: 700;
      margin-bottom: 16px;
    }

    .vn-result .ending-verse {
      font-size: 0.88rem;
      font-style: italic;
      color: #636e72;
      padding: 12px 16px;
      background: #fef9e7;
      border-radius: 8px;
      margin: 16px 0;
      line-height: 1.5;
    }

    .vn-result .ending-message {
      font-size: 0.95rem;
      color: #636e72;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .vn-result .holiness-final {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--novel-color);
      margin: 12px 0;
    }

    .vn-result .holiness-label {
      font-size: 0.85rem;
      color: #95a5a6;
      margin-bottom: 20px;
    }

    /* Path Tracker */
    .path-tracker {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 16px;
    }

    .path-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #dfe6e9;
      transition: background 0.3s ease, transform 0.3s ease;
    }

    .path-dot.active {
      background: var(--novel-color);
      transform: scale(1.3);
    }

    .path-dot.visited {
      background: var(--primary-light);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="game-header">
      <a href="../../index.html" class="back-btn" aria-label="Back to Home">&#8592;</a>
      <h2>The Prodigal's Choice</h2>
    </div>

    <!-- Holiness Score Bar -->
    <div class="holiness-bar" id="holiness-bar">
      <span class="label">Holiness</span>
      <div class="bar-track">
        <div class="bar-fill" id="holiness-fill"></div>
      </div>
      <span class="bar-value" id="holiness-value">0</span>
    </div>

    <!-- Path Progress Dots -->
    <div class="path-tracker" id="path-tracker"></div>

    <!-- Scene Container -->
    <div id="scene-container"></div>

    <!-- Footer -->
    <div class="footer">
      Sunday School Games v2 — Holiness &amp; Sanctification
    </div>
  </div>

  <script src="../../js/shared.js"></script>
  <script>
  (function() {
    'use strict';

    // ========== STATE ==========
    let holinessScore = 0;
    const maxHoliness = 100;
    let currentSceneId = null;
    let visitedScenes = [];
    let gameFinished = false;

    // ========== SCENES ==========
    const scenes = {

      // SCENE 1 — The Request
      'scene-1': {
        id: 'scene-1',
        emoji: '\uD83C\uDFE0',
        bgClass: 'scene-home',
        speaker: 'Narrator',
        dialogue: 'A certain man had two sons. You are the younger son, living at home with your father. One day, a thought comes to you...',
        verses: [
          {
            text: '"And the younger of them said to his father, Father, give me the portion of goods that falleth to me. And he divided unto them his living."',
            ref: 'Luke 15:12 (KJV)'
          }
        ],
        choices: [
          { text: 'Ask for your inheritance and leave home', target: 'scene-2a', points: 0 },
          { text: 'Stay with your father and work faithfully', target: 'scene-2b', points: 30 }
        ]
      },

      // SCENE 2A — The Far Country
      'scene-2a': {
        id: 'scene-2a',
        emoji: '\uD83C\uDFAD',
        bgClass: 'scene-far',
        speaker: 'Narrator',
        dialogue: 'You took your inheritance and traveled to a far country. The world seems exciting! There are parties, new friends, and endless fun. But something feels wrong inside...',
        verses: [
          {
            text: '"And not many days after the younger son gathered all together, and took his journey into a far country, and there wasted his substance with riotous living."',
            ref: 'Luke 15:13 (KJV)'
          }
        ],
        choices: [
          { text: 'Spend freely on pleasures \u2014 this is the life!', target: 'scene-3a', points: 0 },
          { text: 'Stop and think \u2014 is this really right?', target: 'scene-3b', points: 15 }
        ]
      },

      // SCENE 2B — The Faithful Son
      'scene-2b': {
        id: 'scene-2b',
        emoji: '\uD83C\uDF3E',
        bgClass: 'scene-faithful',
        speaker: 'Narrator',
        dialogue: 'You chose to stay. Day by day, you work alongside your father in the fields. It is not always easy, but you feel a deep peace. Your father smiles at your faithfulness.',
        verses: [
          {
            text: '"Be ye holy; for I am holy."',
            ref: '1 Peter 1:16 (KJV)'
          }
        ],
        teaching: 'Holiness sometimes means saying no to temptation before it even starts. You chose the narrow path!',
        autoAdvance: 'scene-2b2',
        autoAdvancePoints: 15
      },

      // SCENE 2B2 — The Trial at Home
      'scene-2b2': {
        id: 'scene-2b2',
        emoji: '\uD83D\uDCA8',
        bgClass: 'scene-road',
        speaker: 'Narrator',
        dialogue: 'Months pass. Your brother has left with his inheritance, and some neighbors whisper that you are foolish for staying. "Why work so hard when you could be enjoying life?" they say. Even your heart sometimes wonders...',
        verses: [
          {
            text: '"And let us not be weary in well doing: for in due season we shall reap, if we faint not."',
            ref: 'Galatians 6:9 (KJV)'
          }
        ],
        choices: [
          { text: 'Stand firm \u2014 faithfulness is its own reward', target: 'scene-2b3', points: 20 },
          { text: 'Maybe the neighbors are right... ask for your share too', target: 'scene-2a', points: 0 }
        ]
      },

      // SCENE 2B3 — The Faithful Rewarded
      'scene-2b3': {
        id: 'scene-2b3',
        emoji: '\uD83C\uDF1F',
        bgClass: 'scene-faithful',
        speaker: 'Narrator',
        dialogue: 'You stayed the course. Your father puts his hand on your shoulder and says, "Son, thou art ever with me, and all that I have is thine." His eyes are full of love. You chose holiness \u2014 and holiness chose you back.',
        verses: [
          {
            text: '"Let us lay aside every weight, and the sin which doth so easily beset us, and let us run with patience the race that is set before us."',
            ref: 'Hebrews 12:1 (KJV)'
          }
        ],
        teaching: 'The faithful path is not always exciting, but God honors those who persevere. Holiness is a daily choice \u2014 and every day you choose God, He is with you.',
        autoAdvance: 'ending-faithful',
        autoAdvancePoints: 15
      },

      // SCENE 3A — The Famine
      'scene-3a': {
        id: 'scene-3a',
        emoji: '\uD83D\uDC37',
        bgClass: 'scene-famine',
        speaker: 'Narrator',
        dialogue: 'A mighty famine came upon the land. Your money is gone. Your friends have vanished. You end up feeding pigs just to survive \u2014 and you are so hungry you would eat their food.',
        verses: [
          {
            text: '"And when he came to himself, he said, How many hired servants of my father\u2019s have bread enough and to spare, and I perish with hunger!"',
            ref: 'Luke 15:17 (KJV)'
          }
        ],
        choices: [
          { text: 'Return to your father and repent', target: 'scene-4a', points: 20 },
          { text: 'Try to survive on your own \u2014 you can handle it', target: 'scene-4b', points: 0 }
        ]
      },

      // SCENE 3B — Early Repentance
      'scene-3b': {
        id: 'scene-3b',
        emoji: '\uD83D\uDE4F',
        bgClass: 'scene-prayer',
        speaker: 'Narrator',
        dialogue: 'You pause and feel a stirring in your heart. Something inside tells you this is not the life your father raised you for. The Holy Spirit is speaking to you...',
        verses: [
          {
            text: '"Draw nigh to God, and he will draw nigh to you. Cleanse your hands, ye sinners; and purify your hearts, ye double minded."',
            ref: 'James 4:8 (KJV)'
          }
        ],
        teaching: 'The Holy Spirit convicts us before we fall too far. God loves you too much to let you wander without calling you back. Will you listen to His voice?',
        choices: [
          { text: 'Return home immediately \u2014 Father, forgive me!', target: 'scene-4a', points: 25 },
          { text: 'Ignore the feeling and keep going...', target: 'scene-3a', points: 0 }
        ]
      },

      // SCENE 4A — The Return (Repentance)
      'scene-4a': {
        id: 'scene-4a',
        emoji: '\uD83D\uDEE4\uFE0F',
        bgClass: 'scene-road',
        speaker: 'Narrator',
        dialogue: 'You begin the long walk home. With every step, you rehearse what you will say. Your heart is heavy with shame, but a spark of hope keeps you moving forward.',
        verses: [
          {
            text: '"I will arise and go to my father, and will say unto him, Father, I have sinned against heaven, and before thee."',
            ref: 'Luke 15:18 (KJV)'
          }
        ],
        autoAdvance: 'scene-5',
        autoAdvancePoints: 10
      },

      // SCENE 4B — Pride's End (Bad Ending)
      'scene-4b': {
        id: 'scene-4b',
        emoji: '\uD83D\uDC94',
        bgClass: 'scene-pride',
        speaker: 'Narrator',
        dialogue: 'You refused to humble yourself. Days grew harder and harder. Alone and starving, you cling to your pride. But pride cannot feed an empty stomach or fill an empty heart.',
        verses: [
          {
            text: '"There is a way which seemeth right unto a man, but the end thereof are the ways of death."',
            ref: 'Proverbs 14:12 (KJV)'
          }
        ],
        teaching: 'Without repentance, there is no restoration. God gives us free will \u2014 but we must choose to return to Him. Pride keeps us in the pigpen when the Father\u2019s house has an open door.',
        autoAdvance: 'ending-unrepentant',
        autoAdvancePoints: 0
      },

      // SCENE 5 — The Father's Love (Best Ending Path)
      'scene-5': {
        id: 'scene-5',
        emoji: '\uD83E\uDD17',
        bgClass: 'scene-love',
        speaker: 'Narrator',
        dialogue: 'While you were still a great way off, your father saw you coming! He did not wait \u2014 he ran to meet you, threw his arms around you, and kissed you. You are home!',
        verses: [
          {
            text: '"But when he was yet a great way off, his father saw him, and had compassion, and ran, and fell on his neck, and kissed him."',
            ref: 'Luke 15:20 (KJV)'
          },
          {
            text: '"If we confess our sins, he is faithful and just to forgive us our sins, and to cleanse us from all unrighteousness."',
            ref: '1 John 1:9 (KJV)'
          }
        ],
        teaching: 'God\u2019s grace meets us the moment we turn back to Him. Repentance opens the door to restoration and holiness! No matter how far you have gone, the Father is watching and waiting for you.',
        autoAdvance: 'ending-restored',
        autoAdvancePoints: 15
      }
    };

    // ========== ENDINGS ==========
    const endings = {

      'ending-restored': {
        id: 'ending-restored',
        emoji: '\uD83C\uDF89',
        title: 'Restored!',
        subtitle: 'The Best Ending',
        message: 'Your father threw a great feast! He brought the best robe, a ring for your finger, and shoes for your feet. "For this my son was dead, and is alive again; he was lost, and is found!" You repented, and God restored you fully.',
        verse: {
          text: '"Create in me a clean heart, O God; and renew a right spirit within me."',
          ref: 'Psalm 51:10 (KJV)'
        },
        bonusPoints: 10,
        bgClass: 'scene-ending'
      },

      'ending-unrepentant': {
        id: 'ending-unrepentant',
        emoji: '\uD83D\uDC94',
        title: 'Unrepentant',
        subtitle: 'A Sad Ending',
        message: 'Without repentance, you remained far from your father. But remember \u2014 it is never too late to turn back! God\u2019s door is always open. He waits with arms wide open for anyone willing to come home.',
        verse: {
          text: '"The Lord is not slack concerning his promise, as some men count slackness; but is longsuffering to us-ward, not willing that any should perish, but that all should come to repentance."',
          ref: '2 Peter 3:9 (KJV)'
        },
        bonusPoints: 0,
        bgClass: 'scene-pride'
      },

      'ending-faithful': {
        id: 'ending-faithful',
        emoji: '\u2B50',
        title: 'Faithful Path',
        subtitle: 'A Good Ending',
        message: 'You chose holiness from the very beginning! While others wandered, you stayed close to your father. Blessed are those who resist temptation and walk faithfully with God every day.',
        verse: {
          text: '"Blessed are the pure in heart: for they shall see God."',
          ref: 'Matthew 5:8 (KJV)'
        },
        bonusPoints: 10,
        bgClass: 'scene-faithful'
      }
    };

    // ========== DOM REFERENCES ==========
    const sceneContainer = document.getElementById('scene-container');
    const holinessFill = document.getElementById('holiness-fill');
    const holinessValue = document.getElementById('holiness-value');
    const pathTracker = document.getElementById('path-tracker');

    // ========== HOLINESS SCORE ==========
    function updateHolinessDisplay() {
      const percent = Math.min((holinessScore / maxHoliness) * 100, 100);
      holinessFill.style.width = percent + '%';
      holinessValue.textContent = holinessScore;
    }

    function addHoliness(points) {
      holinessScore = Math.min(holinessScore + points, maxHoliness);
      updateHolinessDisplay();
    }

    // ========== PATH TRACKER ==========
    function updatePathTracker() {
      // Show a dot for each visited scene
      pathTracker.innerHTML = '';
      const totalPossible = 6; // max path length
      for (let i = 0; i < totalPossible; i++) {
        const dot = document.createElement('div');
        dot.className = 'path-dot';
        if (i < visitedScenes.length - 1) {
          dot.classList.add('visited');
        } else if (i === visitedScenes.length - 1) {
          dot.classList.add('active');
        }
        pathTracker.appendChild(dot);
      }
    }

    // ========== RENDER SCENE ==========
    function renderScene(sceneId) {
      const scene = scenes[sceneId];
      if (!scene) return;

      currentSceneId = sceneId;
      visitedScenes.push(sceneId);
      updatePathTracker();

      // Play click sound
      SSG.audio.click();

      let html = '<div class="vn-scene">';

      // Illustration
      html += '<div class="vn-illustration ' + scene.bgClass + '">';
      html += '<span class="emoji">' + scene.emoji + '</span>';
      html += '</div>';

      // Text area
      html += '<div class="vn-text">';

      // Speaker
      html += '<div class="vn-speaker">' + scene.speaker + '</div>';

      // Dialogue
      html += '<div class="vn-dialogue">' + scene.dialogue + '</div>';

      // Verses
      if (scene.verses && scene.verses.length > 0) {
        scene.verses.forEach(function(v) {
          html += '<div class="vn-verse">';
          html += v.text + '<br><strong>' + v.ref + '</strong>';
          html += '</div>';
        });
      }

      // Teaching
      if (scene.teaching) {
        html += '<div class="vn-teaching">' + scene.teaching + '</div>';
      }

      // Choices or Auto-advance
      if (scene.choices && scene.choices.length > 0) {
        html += '<div class="vn-choices">';
        scene.choices.forEach(function(choice, idx) {
          html += '<button class="vn-choice-btn" data-target="' + choice.target + '" data-points="' + choice.points + '">';
          html += choice.text;
          html += '</button>';
        });
        html += '</div>';
      } else if (scene.autoAdvance) {
        html += '<button class="vn-continue-btn" data-target="' + scene.autoAdvance + '" data-points="' + (scene.autoAdvancePoints || 0) + '">';
        html += 'Continue \u2192';
        html += '</button>';
      }

      html += '</div>'; // .vn-text
      html += '</div>'; // .vn-scene

      sceneContainer.innerHTML = html;

      // Scroll to top of scene
      sceneContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });

      // Bind events
      bindSceneEvents();
    }

    // ========== RENDER ENDING ==========
    function renderEnding(endingId) {
      const ending = endings[endingId];
      if (!ending) return;

      gameFinished = true;

      // Add bonus points
      addHoliness(ending.bonusPoints);

      // Play success or wrong sound depending on ending
      if (endingId === 'ending-unrepentant') {
        SSG.audio.wrong();
      } else {
        SSG.audio.success();
      }

      // Save to profile
      try {
        SSG.addPoints('visual-novel', holinessScore);
        SSG.awardBadge('story_writer');
      } catch (e) {
        // SSG not available
      }

      // Determine rating
      let ratingEmoji = '';
      let ratingText = '';
      if (holinessScore >= 80) {
        ratingEmoji = '\u2B50\u2B50\u2B50';
        ratingText = 'Excellent! You walked in holiness!';
      } else if (holinessScore >= 40) {
        ratingEmoji = '\u2B50\u2B50';
        ratingText = 'Good! You found your way back to God.';
      } else {
        ratingEmoji = '\u2B50';
        ratingText = 'Keep trying! God always welcomes you home.';
      }

      // Hide holiness bar and path tracker for end screen
      document.getElementById('holiness-bar').style.display = 'none';
      document.getElementById('path-tracker').style.display = 'none';

      let html = '<div class="result-screen vn-result">';
      html += '<div class="emoji">' + ending.emoji + '</div>';
      html += '<div class="ending-title">' + ending.title + '</div>';
      html += '<div class="ending-subtitle">' + ending.subtitle + '</div>';
      html += '<div class="ending-message">' + ending.message + '</div>';

      // Ending verse
      html += '<div class="ending-verse">';
      html += ending.verse.text + '<br><strong>' + ending.verse.ref + '</strong>';
      html += '</div>';

      // Holiness score
      html += '<div class="holiness-final">' + holinessScore + ' / ' + maxHoliness + '</div>';
      html += '<div class="holiness-label">Holiness Score &mdash; ' + ratingEmoji + '</div>';
      html += '<div class="ending-message">' + ratingText + '</div>';

      // Buttons
      html += '<div class="btn-group">';
      html += '<button class="btn-primary" id="btn-play-again">Play Again</button>';
      html += '<a href="../../index.html" class="btn-secondary">Home</a>';
      html += '</div>';

      html += '</div>';

      sceneContainer.innerHTML = html;

      // Scroll to top
      window.scrollTo({ top: 0, behavior: 'smooth' });

      // Play again handler
      document.getElementById('btn-play-again').addEventListener('click', function() {
        restartGame();
      });
    }

    // ========== EVENT BINDING ==========
    function bindSceneEvents() {
      // Choice buttons
      var choiceBtns = sceneContainer.querySelectorAll('.vn-choice-btn');
      choiceBtns.forEach(function(btn) {
        btn.addEventListener('click', function() {
          var target = this.getAttribute('data-target');
          var points = parseInt(this.getAttribute('data-points'), 10) || 0;

          // Disable all choice buttons
          choiceBtns.forEach(function(b) { b.disabled = true; });

          // Highlight selected
          this.style.borderColor = 'var(--novel-color)';
          this.style.background = '#e8f8f0';
          this.style.fontWeight = '700';

          // Add holiness points
          addHoliness(points);

          // Short delay then advance
          setTimeout(function() {
            if (endings[target]) {
              renderEnding(target);
            } else {
              renderScene(target);
            }
          }, 600);
        });
      });

      // Continue button
      var continueBtn = sceneContainer.querySelector('.vn-continue-btn');
      if (continueBtn) {
        continueBtn.addEventListener('click', function() {
          var target = this.getAttribute('data-target');
          var points = parseInt(this.getAttribute('data-points'), 10) || 0;

          this.disabled = true;
          addHoliness(points);

          setTimeout(function() {
            if (endings[target]) {
              renderEnding(target);
            } else {
              renderScene(target);
            }
          }, 600);
        });
      }
    }

    // ========== RESTART ==========
    function restartGame() {
      holinessScore = 0;
      currentSceneId = null;
      visitedScenes = [];
      gameFinished = false;

      document.getElementById('holiness-bar').style.display = '';
      document.getElementById('path-tracker').style.display = '';

      updateHolinessDisplay();
      renderScene('scene-1');
    }

    // ========== INIT ==========
    updateHolinessDisplay();
    renderScene('scene-1');

  })();
