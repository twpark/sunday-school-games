<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Word Search — Holiness &amp; Sanctification</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .word-grid {
      grid-template-columns: repeat(10, 1fr);
      max-width: 400px;
      margin: 0 auto;
    }

    .word-grid .cell {
      font-size: clamp(0.85rem, 3.5vw, 1.1rem);
      border: 1px solid #ecf0f1;
      user-select: none;
      -webkit-user-select: none;
    }

    .word-grid .cell:active {
      transform: scale(0.92);
    }

    .word-grid .cell.drag-over {
      background: var(--primary-light);
      color: #fff;
      opacity: 0.7;
    }

    .word-list {
      justify-content: center;
      max-width: 400px;
      margin: 0 auto;
    }

    .verse-popup {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      border-radius: 16px;
      padding: 16px 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.18);
      border-left: 4px solid var(--correct-color);
      max-width: 360px;
      width: calc(100% - 40px);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      transform: translateX(-50%) translateY(20px);
    }

    .verse-popup.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    .verse-popup .popup-word {
      font-family: 'Jua', sans-serif;
      font-size: 1.1rem;
      color: var(--correct-color);
      margin-bottom: 6px;
    }

    .verse-popup .popup-verse {
      font-size: 0.85rem;
      font-style: italic;
      color: #636e72;
      line-height: 1.5;
      margin-bottom: 4px;
    }

    .verse-popup .popup-ref {
      font-size: 0.75rem;
      color: var(--primary);
      font-weight: 700;
    }

    .verse-popup .popup-meaning {
      font-size: 0.8rem;
      color: var(--text-color);
      margin-top: 6px;
      line-height: 1.4;
    }

    .game-complete-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      padding: 20px;
    }

    .game-complete-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .game-complete-overlay .result-screen {
      max-width: 380px;
      width: 100%;
      animation: popIn 0.4s ease-out;
    }

    @keyframes popIn {
      0% { transform: scale(0.7); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .instructions {
      font-size: 0.82rem;
      color: #95a5a6;
      text-align: center;
      padding: 4px 0 8px;
      line-height: 1.4;
    }

    .found-count {
      font-size: 0.85rem;
      color: #95a5a6;
      text-align: center;
      padding: 4px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="game-header">
      <a href="../../index.html" class="back-btn" aria-label="Back to menu">&larr;</a>
      <h2>Word Search</h2>
    </div>

    <!-- Score Bar -->
    <div class="score-bar">
      <span class="score">Score: <span id="score">0</span></span>
      <span class="progress"><span id="found-count">0</span> / <span id="total-count">8</span> words</span>
    </div>

    <!-- Instructions -->
    <p class="instructions">Tap a letter, then tap or drag to the last letter to find hidden words about holiness.</p>

    <!-- Grid Panel -->
    <div class="game-card-panel" style="padding: 12px 8px;">
      <div class="word-grid" id="grid"></div>
    </div>

    <!-- Word List -->
    <div class="word-list" id="word-list"></div>

    <!-- Found count message -->
    <p class="found-count" id="found-msg"></p>
  </div>

  <!-- Verse Popup -->
  <div class="verse-popup" id="verse-popup">
    <div class="popup-word" id="popup-word"></div>
    <div class="popup-verse" id="popup-verse"></div>
    <div class="popup-ref" id="popup-ref"></div>
    <div class="popup-meaning" id="popup-meaning"></div>
  </div>

  <!-- Game Complete Overlay -->
  <div class="game-complete-overlay" id="complete-overlay">
    <div class="result-screen">
      <div class="emoji">🏆</div>
      <h2>All Words Found!</h2>
      <div class="result-score" id="final-score">80</div>
      <p class="result-msg" id="final-msg">
        You discovered all the words about holiness and sanctification!<br>
        "Be ye holy; for I am holy." — 1 Peter 1:16 (KJV)
      </p>
      <div class="btn-group">
        <button class="btn-primary" onclick="location.reload()">Play Again</button>
        <a href="../../index.html" class="btn-secondary">Back to Menu</a>
      </div>
    </div>
  </div>

  <script src="../../js/shared.js"></script>
  <script>
  (function() {
    'use strict';

    // ===== Word Data =====
    const WORDS = [
      {
        word: 'HOLY',
        verse: 'Be ye holy; for I am holy.',
        ref: '1 Peter 1:16 (KJV)',
        meaning: 'God calls us to be set apart and pure, just as He is holy.'
      },
      {
        word: 'PURE',
        verse: 'Blessed are the pure in heart: for they shall see God.',
        ref: 'Matthew 5:8 (KJV)',
        meaning: 'A clean and sincere heart brings us closer to seeing God.'
      },
      {
        word: 'CLEAN',
        verse: 'Create in me a clean heart, O God.',
        ref: 'Psalm 51:10 (KJV)',
        meaning: 'We ask God to wash away our sin and give us a fresh, pure heart.'
      },
      {
        word: 'SANCTIFY',
        verse: 'Sanctify yourselves therefore, and be ye holy.',
        ref: 'Leviticus 20:7 (KJV)',
        meaning: 'To sanctify means to be made holy and set apart for God\'s purpose.'
      },
      {
        word: 'RENEW',
        verse: 'Be renewed in the spirit of your mind.',
        ref: 'Ephesians 4:23 (KJV)',
        meaning: 'God transforms us from the inside out by renewing our thoughts.'
      },
      {
        word: 'CONFESS',
        verse: 'If we confess our sins, he is faithful and just to forgive us.',
        ref: '1 John 1:9 (KJV)',
        meaning: 'When we honestly tell God about our sins, He always forgives us.'
      },
      {
        word: 'HEART',
        verse: 'Keep thy heart with all diligence.',
        ref: 'Proverbs 4:23 (KJV)',
        meaning: 'Guard your heart carefully, because it shapes everything you do.'
      },
      {
        word: 'SPIRIT',
        verse: 'The fruit of the Spirit is love, joy, peace.',
        ref: 'Galatians 5:22 (KJV)',
        meaning: 'The Holy Spirit produces beautiful qualities in those who follow God.'
      }
    ];

    const GRID_SIZE = 10;
    const POINTS_PER_WORD = 10;

    let grid = [];
    let placedWords = []; // { word, cells: [{r, c}], found: false }
    let score = 0;
    let foundWords = 0;
    let selectionStart = null;
    let selectionEnd = null;
    let isDragging = false;

    // ===== Grid Generation =====
    const MIN_WORDS = 6;
    const MAX_RETRIES = 10;

    function generateGrid() {
      for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
        grid = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(''));
        placedWords = [];

        const shuffled = SSG.shuffle([...WORDS]);

        for (const wordData of shuffled) {
          const placed = placeWord(wordData.word);
          if (placed) {
            placedWords.push({
              word: wordData.word,
              cells: placed,
              found: false,
              data: wordData
            });
          }
        }

        if (placedWords.length >= MIN_WORDS) break;
      }

      // Fill remaining empty cells with random letters
      const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          if (grid[r][c] === '') {
            grid[r][c] = alphabet[Math.floor(Math.random() * 26)];
          }
        }
      }
    }

    function placeWord(word) {
      // Try random placements, horizontal and vertical
      const directions = [
        { dr: 0, dc: 1 },  // horizontal (left-to-right)
        { dr: 1, dc: 0 }   // vertical (top-to-bottom)
      ];

      // Build list of all possible positions and shuffle
      const candidates = [];
      for (const dir of directions) {
        for (let r = 0; r < GRID_SIZE; r++) {
          for (let c = 0; c < GRID_SIZE; c++) {
            candidates.push({ r, c, dir });
          }
        }
      }

      const shuffledCandidates = SSG.shuffle(candidates);

      for (const { r, c, dir } of shuffledCandidates) {
        const cells = tryPlace(word, r, c, dir.dr, dir.dc);
        if (cells) {
          // Commit placement
          for (let i = 0; i < word.length; i++) {
            grid[cells[i].r][cells[i].c] = word[i];
          }
          return cells;
        }
      }

      return null;
    }

    function tryPlace(word, startR, startC, dr, dc) {
      const cells = [];
      for (let i = 0; i < word.length; i++) {
        const r = startR + i * dr;
        const c = startC + i * dc;

        // Check bounds
        if (r < 0 || r >= GRID_SIZE || c < 0 || c >= GRID_SIZE) return null;

        // Check cell is empty or has the same letter (for valid overlaps)
        if (grid[r][c] !== '' && grid[r][c] !== word[i]) return null;

        cells.push({ r, c });
      }
      return cells;
    }

    // ===== Rendering =====
    function renderGrid() {
      const gridEl = document.getElementById('grid');
      gridEl.innerHTML = '';

      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.textContent = grid[r][c];
          cell.dataset.row = r;
          cell.dataset.col = c;

          // Check if this cell is part of a found word
          if (isCellFound(r, c)) {
            cell.classList.add('found');
          }

          gridEl.appendChild(cell);
        }
      }

      // Attach event listeners
      attachGridEvents(gridEl);
    }

    function renderWordList() {
      const listEl = document.getElementById('word-list');
      listEl.innerHTML = '';

      // Sort alphabetically for display
      const sorted = [...placedWords].sort((a, b) => a.word.localeCompare(b.word));

      for (const pw of sorted) {
        const item = document.createElement('span');
        item.className = 'word-item' + (pw.found ? ' found' : '');
        item.textContent = pw.word;
        item.dataset.word = pw.word;
        listEl.appendChild(item);
      }
    }

    function updateScoreDisplay() {
      document.getElementById('score').textContent = score;
      document.getElementById('found-count').textContent = foundWords;

      if (foundWords > 0 && foundWords < placedWords.length) {
        document.getElementById('found-msg').textContent =
          'Keep searching! ' + (placedWords.length - foundWords) + ' word' +
          (placedWords.length - foundWords === 1 ? '' : 's') + ' left.';
      } else if (foundWords === 0) {
        document.getElementById('found-msg').textContent = '';
      }
    }

    function isCellFound(r, c) {
      return placedWords.some(pw =>
        pw.found && pw.cells.some(cell => cell.r === r && cell.c === c)
      );
    }

    // ===== Selection Logic =====
    function getCellFromEvent(e) {
      let target;
      if (e.touches && e.touches.length > 0) {
        const touch = e.touches[0];
        target = document.elementFromPoint(touch.clientX, touch.clientY);
      } else if (e.changedTouches && e.changedTouches.length > 0) {
        const touch = e.changedTouches[0];
        target = document.elementFromPoint(touch.clientX, touch.clientY);
      } else {
        target = e.target;
      }

      if (target && target.classList && target.classList.contains('cell')) {
        return {
          r: parseInt(target.dataset.row),
          c: parseInt(target.dataset.col),
          el: target
        };
      }
      return null;
    }

    function getSelectionCells(start, end) {
      if (!start || !end) return [];

      const dr = end.r - start.r;
      const dc = end.c - start.c;

      // Only allow horizontal or vertical selections
      if (dr !== 0 && dc !== 0) return [];

      const cells = [];
      const stepR = dr === 0 ? 0 : (dr > 0 ? 1 : -1);
      const stepC = dc === 0 ? 0 : (dc > 0 ? 1 : -1);
      const steps = Math.max(Math.abs(dr), Math.abs(dc));

      for (let i = 0; i <= steps; i++) {
        cells.push({
          r: start.r + i * stepR,
          c: start.c + i * stepC
        });
      }

      return cells;
    }

    function highlightSelection(cells) {
      // Clear previous highlights
      const allCells = document.querySelectorAll('.word-grid .cell');
      allCells.forEach(cell => {
        if (!cell.classList.contains('found')) {
          cell.classList.remove('selected', 'drag-over');
        }
      });

      // Highlight new selection
      for (const { r, c } of cells) {
        const cell = document.querySelector(
          `.word-grid .cell[data-row="${r}"][data-col="${c}"]`
        );
        if (cell && !cell.classList.contains('found')) {
          cell.classList.add('selected');
        }
      }
    }

    function clearSelection() {
      const allCells = document.querySelectorAll('.word-grid .cell');
      allCells.forEach(cell => {
        cell.classList.remove('selected', 'drag-over');
      });
      selectionStart = null;
      selectionEnd = null;
    }

    function checkSelection(cells) {
      if (cells.length === 0) return;

      // Build the selected word string (forward and reversed)
      const selectedWord = cells.map(({ r, c }) => grid[r][c]).join('');
      const reversedWord = selectedWord.split('').reverse().join('');

      // Check against placed words
      for (const pw of placedWords) {
        if (pw.found) continue;

        if (pw.cells.length !== cells.length) continue;

        // Check forward match (dragged in placement direction)
        if (pw.word === selectedWord) {
          let match = true;
          for (let i = 0; i < cells.length; i++) {
            if (cells[i].r !== pw.cells[i].r || cells[i].c !== pw.cells[i].c) {
              match = false;
              break;
            }
          }
          if (match) {
            wordFound(pw);
            return;
          }
        }

        // Check reverse match (dragged opposite to placement direction)
        if (pw.word === reversedWord) {
          let match = true;
          for (let i = 0; i < cells.length; i++) {
            const ri = cells.length - 1 - i;
            if (cells[i].r !== pw.cells[ri].r || cells[i].c !== pw.cells[ri].c) {
              match = false;
              break;
            }
          }
          if (match) {
            wordFound(pw);
            return;
          }
        }
      }

      // No match: flash and clear
      SSG.audio.click();
      clearSelection();
    }

    function wordFound(pw) {
      pw.found = true;
      foundWords++;
      score += POINTS_PER_WORD;

      SSG.audio.correct();

      // Mark cells as found in DOM
      for (const { r, c } of pw.cells) {
        const cell = document.querySelector(
          `.word-grid .cell[data-row="${r}"][data-col="${c}"]`
        );
        if (cell) {
          cell.classList.remove('selected');
          cell.classList.add('found');
        }
      }

      // Update word list
      const wordItem = document.querySelector(`.word-item[data-word="${pw.word}"]`);
      if (wordItem) {
        wordItem.classList.add('found');
      }

      updateScoreDisplay();
      showVersePopup(pw.data);

      // Check game completion
      if (foundWords === placedWords.length) {
        setTimeout(() => {
          gameComplete();
        }, 3200);
      }
    }

    function showVersePopup(wordData) {
      const popup = document.getElementById('verse-popup');
      document.getElementById('popup-word').textContent = wordData.word;
      document.getElementById('popup-verse').textContent = '"' + wordData.verse + '"';
      document.getElementById('popup-ref').textContent = '— ' + wordData.ref;
      document.getElementById('popup-meaning').textContent = wordData.meaning;

      popup.classList.add('show');

      setTimeout(() => {
        popup.classList.remove('show');
      }, 3000);
    }

    function gameComplete() {
      // Save score and award badge
      SSG.addPoints('word-puzzle', score);
      SSG.awardBadge('word_finder');

      document.getElementById('final-score').textContent = score + ' points';

      const overlay = document.getElementById('complete-overlay');
      overlay.classList.add('show');

      SSG.audio.success();
    }

    // ===== Event Handling =====
    function attachGridEvents(gridEl) {
      // --- Touch Events ---
      gridEl.addEventListener('touchstart', function(e) {
        e.preventDefault();
        const cell = getCellFromEvent(e);
        if (cell) {
          isDragging = true;
          selectionStart = { r: cell.r, c: cell.c };
          selectionEnd = { r: cell.r, c: cell.c };
          highlightSelection([selectionStart]);
        }
      }, { passive: false });

      gridEl.addEventListener('touchmove', function(e) {
        e.preventDefault();
        if (!isDragging || !selectionStart) return;

        const cell = getCellFromEvent(e);
        if (cell) {
          selectionEnd = { r: cell.r, c: cell.c };
          const cells = getSelectionCells(selectionStart, selectionEnd);
          highlightSelection(cells);
        }
      }, { passive: false });

      gridEl.addEventListener('touchend', function(e) {
        e.preventDefault();
        if (!isDragging || !selectionStart) return;

        isDragging = false;
        const cell = getCellFromEvent(e);
        if (cell) {
          selectionEnd = { r: cell.r, c: cell.c };
        }

        if (selectionStart && selectionEnd) {
          const cells = getSelectionCells(selectionStart, selectionEnd);
          if (cells.length > 0) {
            checkSelection(cells);
          } else {
            clearSelection();
          }
        }
        selectionStart = null;
        selectionEnd = null;
      }, { passive: false });

      // --- Mouse Events (for desktop/testing) ---
      gridEl.addEventListener('mousedown', function(e) {
        const cell = getCellFromEvent(e);
        if (cell) {
          isDragging = true;
          selectionStart = { r: cell.r, c: cell.c };
          selectionEnd = { r: cell.r, c: cell.c };
          highlightSelection([selectionStart]);
        }
      });

      gridEl.addEventListener('mousemove', function(e) {
        if (!isDragging || !selectionStart) return;

        const cell = getCellFromEvent(e);
        if (cell) {
          selectionEnd = { r: cell.r, c: cell.c };
          const cells = getSelectionCells(selectionStart, selectionEnd);
          highlightSelection(cells);
        }
      });

      gridEl.addEventListener('mouseup', function(e) {
        if (!isDragging || !selectionStart) return;

        isDragging = false;
        const cell = getCellFromEvent(e);
        if (cell) {
          selectionEnd = { r: cell.r, c: cell.c };
        }

        if (selectionStart && selectionEnd) {
          const cells = getSelectionCells(selectionStart, selectionEnd);
          if (cells.length > 0) {
            checkSelection(cells);
          } else {
            clearSelection();
          }
        }
        selectionStart = null;
        selectionEnd = null;
      });

      // Cancel selection if mouse leaves grid
      gridEl.addEventListener('mouseleave', function() {
        if (isDragging) {
          isDragging = false;
          clearSelection();
          selectionStart = null;
          selectionEnd = null;
        }
      });
    }

    // ===== Initialization =====
    function init() {
      generateGrid();
      renderGrid();
      renderWordList();
      document.getElementById('total-count').textContent = placedWords.length;
      updateScoreDisplay();
    }

    init();
  })();
  </script>
</body>
</html>
